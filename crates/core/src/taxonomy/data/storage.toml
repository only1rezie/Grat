# Storage Error Taxonomy
# Category: Storage â€” errors related to ledger entry access and contract data operations.

[category]
name = "Storage"
description = "Errors triggered when reading, writing, or managing contract data entries in the ledger."
source_module = "soroban-env-host/src/storage.rs"

[[errors]]
id = "host.storage.access_denied"
category = "storage"
code = 0
name = "AccessDenied"
severity = "Error"
since_protocol = 20
summary = "The contract attempted to access a ledger entry not included in the transaction's footprint."
detailed_explanation = """
Every Soroban transaction must declare its read/write footprint â€” the set of ledger entries it \
will access. If the contract tries to read or write an entry not in the declared footprint, \
the host rejects the access. This is a fundamental part of Soroban's parallel execution model.
"""

[[errors.common_causes]]
description = "Missing ledger entries in the transaction's resource footprint declaration"
likelihood = "high"

[[errors.common_causes]]
description = "Cross-contract call accessing entries not anticipated by the outer transaction"
likelihood = "medium"

[[errors.suggested_fixes]]
description = "Use simulateTransaction to automatically compute the correct footprint before submission"
difficulty = "easy"
requires_upgrade = false

[[errors.suggested_fixes]]
description = "Manually add the missing ledger key to the transaction's read/write footprint"
difficulty = "medium"
requires_upgrade = false

related_errors = ["host.storage.missing_key"]
source_file = "soroban-env-host/src/storage.rs"

[[errors]]
id = "host.storage.entry_not_found"
category = "storage"
code = 1
name = "EntryNotFound"
severity = "Error"
since_protocol = 20
summary = "The contract attempted to read a ledger key that does not exist or has been archived."
detailed_explanation = """
The host could not load the requested ledger entry. The key may never have been written, may have
expired from live state, or may need restoration before the contract can access it.
"""
related_errors = ["host.storage.access_denied"]
source_file = "soroban-env-host/src/storage.rs"

[[errors.common_causes]]
description = "The contract read a key before any transaction created it"
likelihood = "high"

[[errors.common_causes]]
description = "The ledger entry expired or was archived before this transaction ran"
likelihood = "medium"

[[errors.suggested_fixes]]
description = "Create or initialize the missing ledger entry before reading it"
difficulty = "easy"
requires_upgrade = false

[[errors.suggested_fixes]]
description = "Restore archived contract data before submitting the transaction"
difficulty = "medium"
requires_upgrade = false

[[errors]]
id = "host.storage.exceeded_limit"
category = "storage"
code = 2
name = "ExceededLimit"
severity = "Error"
since_protocol = 20
summary = "The operation attempted to exceed resource or size limits for ledger data."
detailed_explanation = """
The storage operation would exceed a protocol limit for ledger data, such as entry size, footprint
size, or the amount of data read or written by the transaction.
"""
related_errors = ["host.budget.exceeded_limit"]
source_file = "soroban-env-host/src/storage.rs"

[[errors.common_causes]]
description = "The contract attempted to write a ledger entry larger than the protocol allows"
likelihood = "high"

[[errors.common_causes]]
description = "The transaction touched more ledger entries than its footprint or limits allowed"
likelihood = "medium"

[[errors.suggested_fixes]]
description = "Reduce the size of stored values or split the data across smaller entries"
difficulty = "medium"
requires_upgrade = true

[[errors.suggested_fixes]]
description = "Break the storage update into multiple smaller transactions"
difficulty = "medium"
requires_upgrade = true

[[errors]]
id = "host.storage.internal_error"
category = "storage"
code = 3
name = "InternalError"
severity = "Error"
since_protocol = 20
summary = "An internal storage failure occurred while accessing contract data."
detailed_explanation = """
The storage layer reported an unexpected internal failure. This code alone is not enough to identify
the root issue; diagnostic events and transaction context usually provide the next clue.
"""
related_errors = []
source_file = "soroban-env-host/src/storage.rs"

[[errors.common_causes]]
description = "The host encountered an unexpected storage state while loading or writing ledger data"
likelihood = "medium"

[[errors.common_causes]]
description = "The transaction hit a storage edge case that needs diagnostic events to identify"
likelihood = "medium"

[[errors.suggested_fixes]]
description = "Check diagnostic events for the specific ledger key or operation that triggered the internal failure"
difficulty = "medium"
requires_upgrade = false

[[errors.suggested_fixes]]
description = "If the error is reproducible, report it with the transaction envelope and diagnostic trace"
difficulty = "hard"
requires_upgrade = false

[[errors.suggested_fixes]]
description = "Retry the operation against a fresh ledger snapshot to rule out transient state corruption"
difficulty = "easy"
requires_upgrade = false

[[errors]]
id = "host.storage.near_expiry"
category = "storage"
code = 4
name = "NearExpiry"
severity = "Warning"
since_protocol = 20
summary = "The accessed ledger entry is approaching its expiration ledger and will soon become read-only unless extended."
detailed_explanation = """
Soroban ledger entries have a time-to-live measured in ledgers. This warning indicates that a \
contract read or written an entry that is close to expiring. The operation succeeded, but the \
entry must be extended with extendTTL before it archives or future transactions will fail with \
EntryNotFound. This is not a blocking error â€” it is a signal to act before the entry is lost.
"""

[[errors.common_causes]]
description = "Contract data was created or last extended many ledgers ago and TTL refresh was missed"
likelihood = "high"

[[errors.suggested_fixes]]
description = "Call extendTTL on the entry to push the expiration ledger further into the future"
difficulty = "easy"
requires_upgrade = false

[[errors.suggested_fixes]]
description = "Set up automated TTL extension for long-lived contract data"
difficulty = "medium"
requires_upgrade = true

related_errors = ["host.storage.entry_not_found"]
source_file = "soroban-env-host/src/storage.rs"